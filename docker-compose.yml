services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - mongo
    environment:
      - FLASK_ENV=development

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: lms_user
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: lms_db
    ports:
      - "5433:5432"

  mongo:
    image: mongo:6
    restart: always
    ports:
      - "27018:27017"